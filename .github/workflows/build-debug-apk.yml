name: Build debug APK

on:
  push:
    branches:
      - claude/android-file-manager-media-ab1yii
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug and release APKs
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: whatfiles-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Read version name
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          # Pull just the section for this version (from "## vX.Y.Z" to the next "## v") so the
          # in-app updater shows our curated changelog instead of a raw commit list.
          awk -v hdr="## v$VERSION" '
            index($0, hdr) == 1 { found = 1; next }
            found && /^## v/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md || true
          if [ ! -s release_notes.md ]; then
            echo "See the full changelog in the app or on GitHub." > release_notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: WhatFiles? v${{ steps.version.outputs.name }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          body_path: release_notes.md
          generate_release_notes: true
          make_latest: true
